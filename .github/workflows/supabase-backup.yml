name: Supabase backup

# Backup diario de los DATOS de la base, SIN contraseña de Postgres.
# Usa la service_role key (Supabase → Settings → API Keys) contra la API
# REST para exportar todas las tablas a JSON, y sube el resultado como
# artifact de GitHub (descargable por 30 días). El plan Free no incluye
# backups automáticos, así que esta es la red de seguridad.
#
# REQUISITO (una sola vez): crear el secret SUPABASE_SERVICE_ROLE_KEY.
# Ver docs/backups-y-keepalive.md. Si el secret no está, se saltea sin fallar.

on:
  schedule:
    - cron: "0 5 * * *" # todos los días, 05:00 UTC
  workflow_dispatch: {} # permite dispararlo a mano

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar que el secret esté configurado
        id: guard
        env:
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::Falta el secret SUPABASE_SERVICE_ROLE_KEY. Se omite el backup."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (para usar scripts/backup-json.mjs)
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Exportar la base a JSON
        if: steps.guard.outputs.run == 'true'
        env:
          SUPABASE_URL: "https://szkmktxziojzgfjkomua.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_DIR: backup
        run: node scripts/backup-json.mjs

      - name: Subir backup como artifact
        # always(): si algún tabla falló el script sale con código 1, pero
        # igual queremos guardar lo que sí se pudo exportar.
        if: ${{ always() && steps.guard.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: noborders-backup
          path: backup/
          retention-days: 30
          if-no-files-found: warn
