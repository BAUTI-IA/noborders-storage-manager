name: Supabase keep-alive

# Los proyectos Free de Supabase se pausan tras 7 días sin actividad.
# Este workflow toca la API del proyecto cada 3 días para que nunca
# se considere "inactivo". No usa secretos: la publishable key es
# pública por diseño (ya está en src/App.jsx) y solo permite lo que
# permitan las políticas RLS.

on:
  schedule:
    - cron: "0 6 */3 * *" # cada 3 días, 06:00 UTC
  workflow_dispatch: {} # permite dispararlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: "https://szkmktxziojzgfjkomua.supabase.co"
      SUPABASE_KEY: "sb_publishable_v2VNtyiQ_tTAAmEWDdHwYg_IJ-_IN-5"
    steps:
      - name: Ping Auth health (registra actividad en el gateway)
        run: |
          echo "GET /auth/v1/health"
          curl --fail-with-body --silent --show-error \
            "$SUPABASE_URL/auth/v1/health"
          echo

      - name: Ping REST (toca Postgres a través de PostgREST)
        run: |
          echo "GET /rest/v1/storages?select=id&limit=1"
          # No exigimos 200: RLS puede devolver [] o 401, pero la
          # petición igual mantiene el proyecto activo. Solo falla si
          # el endpoint es inalcanzable (problema de red/proyecto caído).
          code=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/storages?select=id&limit=1")
          echo "HTTP $code"
          if [ "$code" = "000" ]; then
            echo "::error::No se pudo alcanzar el proyecto Supabase."
            exit 1
          fi
